apiVersion: batch/v1
kind: Job
metadata:
  name: performance-iq-serving-producer-smoke
  labels:
    app.kubernetes.io/name: performance-iq-serving-producer-smoke
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: performance-iq-serving-producer-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: performance-iq-sdk:serving-smoke
          imagePullPolicy: IfNotPresent
          env:
            - name: PIQ_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: performance-iq-serving-producer
                  key: base-url
            - name: PIQ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: performance-iq-serving-producer
                  key: token
                  optional: true
            - name: PIQ_SERVING_MODEL
              value: Qwen/Qwen2.5-0.5B-Instruct
            - name: PIQ_SERVING_USD_PER_GPU_HOUR
              valueFrom:
                secretKeyRef:
                  name: performance-iq-serving-producer
                  key: usd-per-gpu-hour
            - name: PIQ_SERVING_GPU_COUNT
              value: "1"
            - name: PIQ_SERVING_CAPTURE_TOKEN_DETAILS
              value: "true"
            - name: PIQ_SERVING_TOP_LOGPROBS
              value: "5"
            - name: PIQ_SERVING_RESOLVE_TOKEN_IDS_WITH_TOKENIZER
              value: "true"
            - name: PIQ_SERVING_COLLECT_HARDWARE_METRICS
              value: "true"
            - name: PIQ_SERVING_REQUIRE_NATIVE_TELEMETRY
              value: "true"
            - name: PIQ_SERVING_REQUIRE_HARDWARE_TELEMETRY
              value: "true"
            - name: PIQ_SERVING_VERIFY_AFTER_CAPTURE
              value: "true"
            - name: PIQ_SERVING_REQUIRE_TELEMETRY_COVERAGE
              value: "true"
            - name: PIQ_VLLM_URL
              value: http://vllm:8000
            - name: PIQ_SGLANG_URL
              value: http://sglang:30000
            - name: PIQ_TENSORRT_LLM_URL
              value: http://tensorrt-llm:8001
            - name: PIQ_VLLM_METRICS_URL
              value: http://vllm:8000/metrics
            - name: PIQ_SGLANG_METRICS_URL
              value: http://sglang:30000/metrics
            - name: PIQ_TENSORRT_LLM_METRICS_URL
              value: http://tensorrt-llm:8001/prometheus/metrics
            - name: PIQ_TENSORRT_LLM_JSON_METRICS_URL
              value: http://tensorrt-llm:8001/metrics
            - name: PIQ_TENSORRT_LLM_PERF_METRICS_URL
              value: http://tensorrt-llm:8001/perf_metrics
            - name: PIQ_VLLM_HARDWARE_METRICS_URL
              value: http://dcgm-exporter:9400/metrics
            - name: PIQ_SGLANG_HARDWARE_METRICS_URL
              value: http://dcgm-exporter:9400/metrics
            - name: PIQ_TENSORRT_LLM_HARDWARE_METRICS_URL
              value: http://dcgm-exporter:9400/metrics
            - name: PIQ_ARTIFACT_DIR
              value: /tmp/performance-iq-serving-producers
            - name: PIQ_SERVING_RECEIPT_LOG
              value: /tmp/performance-iq-serving-producers/request-receipts.jsonl
            - name: PIQ_SERVING_SUMMARY_OUT
              value: /tmp/performance-iq-serving-producers/serving-smoke-proof.json
            - name: PIQ_SERVING_EVENT_LOG
              value: /tmp/performance-iq-serving-producers/serving-events.jsonl
            - name: PIQ_SERVING_EVENT_TOPIC
              value: performance-iq.serving.telemetry.v1
          command:
            - python
            - -m
            - performance_iq_sdk.serving_smoke
          args:
            - --query-dashboard
            - --record-receipts
            - --verify-after-capture
            - --require-telemetry-coverage
            - --receipt-log
            - $(PIQ_SERVING_RECEIPT_LOG)
            - --repetitions
            - "3"
