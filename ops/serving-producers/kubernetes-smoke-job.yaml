apiVersion: batch/v1
kind: Job
metadata:
  name: performance-iq-serving-producer-smoke
  labels:
    app.kubernetes.io/name: performance-iq-serving-producer-smoke
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: performance-iq-serving-producer-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: performance-iq-sdk:serving-smoke
          imagePullPolicy: IfNotPresent
          env:
            - name: PIQ_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: performance-iq-serving-producer
                  key: base-url
            - name: PIQ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: performance-iq-serving-producer
                  key: token
                  optional: true
            - name: PIQ_SERVING_MODEL
              value: Qwen/Qwen2.5-0.5B-Instruct
            - name: PIQ_VLLM_URL
              value: http://vllm:8000
            - name: PIQ_SGLANG_URL
              value: http://sglang:30000
            - name: PIQ_TENSORRT_LLM_URL
              value: http://tensorrt-llm:8001
            - name: PIQ_ARTIFACT_DIR
              value: /tmp/performance-iq-serving-producers
            - name: PIQ_SERVING_RECEIPT_LOG
              value: /tmp/performance-iq-serving-producers/request-receipts.jsonl
            - name: PIQ_SERVING_SUMMARY_OUT
              value: /tmp/performance-iq-serving-producers/serving-smoke-proof.json
          command:
            - python
            - -m
            - performance_iq_sdk.serving_smoke
          args:
            - --query-dashboard
            - --record-receipts
            - --receipt-log
            - $(PIQ_SERVING_RECEIPT_LOG)
            - --repetitions
            - "3"
