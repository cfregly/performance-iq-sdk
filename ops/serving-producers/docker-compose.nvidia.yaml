name: performance-iq-serving-producers

services:
  dcgm-exporter:
    image: ${PIQ_DCGM_EXPORTER_IMAGE:-nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-distroless@sha256:60d3b00ac80b4ae77f94dae2f943685605585ad9e92fdccda3154d009ae317cc}
    command:
      - -f
      - /etc/performance-iq/dcgm-counters.csv
      - -c
      - ${PIQ_DCGM_EXPORTER_INTERVAL_MS:-33}
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./dcgm-counters.csv:/etc/performance-iq/dcgm-counters.csv:ro
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm:
    image: ${PIQ_VLLM_IMAGE:-vllm/vllm-openai:v0.23.0@sha256:6d8429e38e3747723ca07ee1b17972e09bb9c51c4032b266f24fb1cc3b22ed8f}
    command:
      - --model
      - ${PIQ_SERVING_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --served-model-name
      - ${PIQ_SERVING_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --revision
      - ${PIQ_SERVING_MODEL_REVISION:-7ae557604adf67be50417f59c2c2f167def9a775}
      - --max-model-len
      - ${PIQ_SERVING_MAX_MODEL_LEN:-1024}
      - --max-num-seqs
      - ${PIQ_SERVING_MAX_CONCURRENCY:-8}
      - --gpu-memory-utilization
      - ${PIQ_VLLM_GPU_MEMORY_UTILIZATION:-0.20}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${PIQ_SERVING_CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sglang:
    image: ${PIQ_SGLANG_IMAGE:-lmsysorg/sglang:v0.5.12@sha256:42194170546745092e74cd5f81ad32a7c6e944c7111fe7bf13588152277ff356}
    command:
      - python
      - -m
      - sglang.launch_server
      - --model-path
      - ${PIQ_SERVING_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --served-model-name
      - ${PIQ_SERVING_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --revision
      - ${PIQ_SERVING_MODEL_REVISION:-7ae557604adf67be50417f59c2c2f167def9a775}
      - --host
      - 0.0.0.0
      - --port
      - "30000"
      - --context-length
      - ${PIQ_SERVING_MAX_MODEL_LEN:-1024}
      - --max-running-requests
      - ${PIQ_SERVING_MAX_CONCURRENCY:-8}
      - --mem-fraction-static
      - ${PIQ_SGLANG_MEM_FRACTION_STATIC:-0.20}
      - --enable-metrics
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${PIQ_SERVING_CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "30000:30000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tensorrt-llm:
    image: ${PIQ_TENSORRT_LLM_IMAGE:-nvcr.io/nvidia/tensorrt-llm/release:1.2.1@sha256:33cd085b772947bd22b7273886539331420404e5d2a4a039945241945ff927b9}
    command:
      - trtllm-serve
      - ${PIQ_SERVING_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --backend
      - ${PIQ_TENSORRT_LLM_BACKEND:-tensorrt}
      - --revision
      - ${PIQ_SERVING_MODEL_REVISION:-7ae557604adf67be50417f59c2c2f167def9a775}
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --max_seq_len
      - ${PIQ_SERVING_MAX_MODEL_LEN:-1024}
      - --max_batch_size
      - ${PIQ_SERVING_MAX_CONCURRENCY:-8}
      - --max_num_tokens
      - ${PIQ_TENSORRT_LLM_MAX_NUM_TOKENS:-1024}
      - --kv_cache_free_gpu_memory_fraction
      - ${PIQ_TENSORRT_LLM_KV_CACHE_FRACTION:-0.20}
      - --config
      - /etc/performance-iq/tensorrt-llm-config.yaml
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      CUDA_VISIBLE_DEVICES: ${PIQ_SERVING_CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - ./tensorrt-llm-config.yaml:/etc/performance-iq/tensorrt-llm-config.yaml:ro
    ports:
      - "8001:8001"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
